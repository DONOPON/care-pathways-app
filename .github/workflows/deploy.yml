name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci || npm install
      - name: Build
        # vite.config.ts deduce el base a partir de GITHUB_REPOSITORY
        # automáticamente. No hace falta pasar VITE_BASE manualmente.
        run: npm run build
      - name: Verify build output
        run: |
          ls -la dist/
          echo "--- index.html ---"
          cat dist/index.html
          echo "--- assets ---"
          ls -la dist/assets/ | head -20
      - name: Add SPA 404 fallback
        run: cp dist/index.html dist/404.html
      - name: Disable Jekyll processing
        run: touch dist/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
